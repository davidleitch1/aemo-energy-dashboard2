name: API Tests

on:
  push:
    branches: [main]
    paths:
      - 'src/aemo_dashboard/api/**'
      - 'tests/api/**'
      - '.github/workflows/api-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/aemo_dashboard/api/**'
      - 'tests/api/**'
      - '.github/workflows/api-tests.yml'
  workflow_dispatch:

jobs:
  test:
    name: pytest tests/api/
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('.github/workflows/api-tests.yml') }}

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            fastapi \
            'uvicorn[standard]' \
            cachetools \
            pytest \
            pytest-asyncio \
            httpx \
            pyyaml \
            duckdb

      - name: Run API tests
        env:
          PYTHONPATH: src
        run: pytest tests/api/ -v --tb=short
